name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 platform-tools"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"
          generate-job-summary: false
          cache-disabled: true

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore app/debug.keystore \
            -alias debug \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Debug,OU=SynxVipUnlocker,O=Synx,L=Unknown,ST=Unknown,C=US"
          # 创建 signing.properties
          cat > app/signing.properties << 'EOF'
          storeFile=debug.keystore
          storePassword=android
          keyAlias=debug
          keyPassword=android
          EOF

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SynxVipUnlocker-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
